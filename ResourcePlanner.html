<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enterprise Resource Planner</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top left, #ffffff 0%, #e4ecf7 40%, #f4f6f9 100%);
    color: #2c3e50;
    line-height: 1.5;
}

.app-header {
    padding: 18px 24px 12px;
    background: linear-gradient(135deg, #1f2933, #111827);
    color: #e5edff;
    box-shadow: 0 3px 10px rgba(15, 23, 42, 0.35);
}

.app-header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.navbar {
    display: flex;
    background: #1f2933;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.35);
    position: sticky;
    top: 0;
    z-index: 50;
}
.navbar button {
    flex: 1;
    padding: 14px 18px;
    background: transparent;
    border: none;
    color: #cbd5f5;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
}
.navbar button:hover {
    background: rgba(148, 163, 184, 0.22);
    color: #e5edff;
}
.navbar button.active {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #f9fafb;
    box-shadow: inset 0 -2px 0 rgba(15, 23, 42, 0.45);
}

.tab {
    display: none;
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto 32px auto;
}
.tab.active {
    display: block;
}

h2 {
    margin: 0 0 16px 0;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: #111827;
}

h3 {
    margin: 0 0 12px 0;
    font-size: 18px;
    font-weight: 600;
    color: #111827;
}

.section {
    background: #ffffff;
    padding: 18px 20px 14px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 12px 22px rgba(15, 23, 42, 0.08);
    border: 1px solid rgba(148, 163, 184, 0.35);
}

.section h3 {
    margin-bottom: 14px;
}

label {
    display: inline-flex;
    flex-direction: column;
    gap: 3px;
    margin: 0 16px 10px 0;
    font-size: 12px;
    font-weight: 500;
    color: #4b5563;
}

input,
select {
    padding: 8px 10px;
    min-width: 180px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    box-sizing: border-box;
    background: #f9fafb;
    color: #111827;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, transform 0.08s ease;
}

input::placeholder {
    color: #9ca3af;
}

input:focus,
select:focus {
    outline: none;
    border-color: #2563eb;
    background: #ffffff;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
    transform: translateY(-0.5px);
}

select {
    min-width: 130px;
    padding-right: 26px;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, #6b7280 50%), linear-gradient(135deg, #6b7280 50%, transparent 50%);
    background-position: calc(100% - 14px) 52%, calc(100% - 9px) 52%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
}

input[type="color"] {
    padding: 0;
    height: 28px;
    width: 42px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid #cbd5e1;
    background: #f9fafb;
}

input[type="date"] {
    min-width: 160px;
}

input[type="number"] {
    max-width: 120px;
}

button {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #ffffff;
    border: none;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 14px;
    box-shadow: 0 8px 16px rgba(37, 99, 235, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, opacity 0.15s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.32);
    opacity: 0.96;
}

button:active {
    transform: translateY(0);
    box-shadow: 0 6px 12px rgba(30, 64, 175, 0.4);
}

button:disabled {
    cursor: default;
    opacity: 0.55;
    box-shadow: none;
}

.gantt-container {
    overflow: auto;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    box-shadow: 0 12px 22px rgba(15, 23, 42, 0.08);
    margin-top: 16px;
}

.gantt-wrapper {
    display: flex;
    width: 100%;
}

.gantt-fixed {
    flex: 0 0 170px;
    width: 170px;
    overflow: hidden;
    border-right: 1px solid #e5e7eb;
    box-shadow: 4px 0 8px -2px rgba(0, 0, 0, 0.08);
    z-index: 2;
    background: #fff;
}

.gantt-names-table {
    width: 170px;
    border-collapse: collapse;
    table-layout: fixed;
}

.gantt-names-table th,
.gantt-names-table td {
    border: 1px solid #e5e7eb;
    border-right: none;
    vertical-align: top;
    padding: 3px 8px;
    box-sizing: border-box;
}

.gantt-names-table .tester-corner {
    background: linear-gradient(135deg, #e5e7eb 0%, #dbeafe 100%);
}

.gantt-names-table .tester-label {
    padding: 3px 8px;
    background: linear-gradient(180deg, #f9fafb 0%, #eef2ff 100%);
    font-weight: 600;
    font-size: 12px;
}

.gantt-scroll {
    flex: 1;
    min-width: 0;
    overflow: auto;
}

.gantt-table {
    border-collapse: collapse;
    table-layout: fixed;
}

.gantt-table .col-week {
    width: 100px;
    min-width: 100px;
}

.gantt-table th,
.gantt-table td {
    border: 1px solid #e5e7eb;
    vertical-align: top;
    padding: 0;
    box-sizing: border-box;
}

.gantt-table .month-cell {
    background: linear-gradient(180deg, #e5e7eb 0%, #dbeafe 100%);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #111827;
    padding: 4px 2px;
    text-align: center;
    height: 24px;
}

.gantt-table .week-header-cell {
    background: linear-gradient(180deg, #e5e7eb 0%, #e0f2fe 100%);
    text-align: center;
    font-size: 9px;
    font-weight: 600;
    color: #111827;
    padding: 4px 2px;
    height: 46px;
}

.gantt-table .week-week {
    font-size: 9px;
    font-weight: 700;
    display: block;
}

.gantt-table .week-days {
    font-size: 9px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.gantt-table .week-cell {
    height: 76px;
    font-size: 10px;
    padding: 3px 4px;
    overflow: hidden;
    background: #ffffff;
    position: relative;
    box-sizing: border-box;
}

.gantt-table thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: linear-gradient(180deg, #e5e7eb 0%, #dbeafe 100%);
}

.project-box {
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 9px;
    color: #ffffff;
    margin-bottom: 3px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.35);
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    box-sizing: border-box;
}

.project-box[data-start][data-end] {
    position: absolute;
    min-width: 8px;
}

.leave-box {
    background: linear-gradient(135deg, #6b7280, #4b5563);
    color: #ffffff;
    text-align: center;
    border-radius: 4px;
    font-size: 9px;
    margin-bottom: 3px;
    padding: 2px 4px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.35);
    box-sizing: border-box;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
}

.leave-box[data-start][data-end] {
    position: absolute;
    min-width: 8px;
}

.over {
    box-shadow: inset 0 0 0 2px rgba(220, 38, 38, 0.85);
    background-image: repeating-linear-gradient(
        135deg,
        rgba(248, 113, 113, 0.08),
        rgba(248, 113, 113, 0.08) 6px,
        transparent 6px,
        transparent 12px
    );
}

table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    background: #ffffff;
}

th,
td {
    border: 1px solid #e5e7eb;
    padding: 8px 10px;
    font-size: 13px;
}

th {
    background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
    text-align: left;
    font-weight: 600;
    color: #111827;
}

tbody tr:nth-child(even) {
    background: #f9fafb;
}

tbody tr:hover {
    background: #eff6ff;
}

/* Simple modal for editing records */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(3px);
}
.modal {
    background: #ffffff;
    padding: 22px 22px 18px;
    border-radius: 12px;
    min-width: 280px;
    max-width: 480px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.45);
}
.modal h3 {
    margin-top: 0;
    margin-bottom: 14px;
}
.modal-footer {
    margin-top: 18px;
    text-align: right;
}

.modal label {
    width: 100%;
    margin-right: 0;
}

.modal input,
.modal select {
    width: 100%;
}

@media (max-width: 768px) {
    .tab {
        padding: 16px;
    }

    .gantt-table .col-tester {
        width: 130px;
        min-width: 130px;
    }

    .gantt-table .col-week {
        width: 80px;
        min-width: 80px;
    }
}
</style>
</head>

<body>

<div class="app-header">
    <h1>Resource Planner</h1>
</div>

<div class="navbar">
    <button class="active" onclick="showTab('dashboard', this)">Yearly Capacity</button>
    <button onclick="showTab('testers', this)">Testers</button>
    <button onclick="showTab('projects', this)">Projects</button>
    <button onclick="showTab('allocations', this)">Allocations</button>
    <button onclick="showTab('leave', this)">Leave</button>
</div>

<!-- DASHBOARD TAB -->
<div id="dashboard" class="tab active">
    <h2>Yearly Capacity Gantt</h2>
    <button onclick="exportToExcel()">Export to Excel</button>
    <button onclick="exportToJson()">Export JSON</button>
    <button onclick="importFromJson()">Import JSON</button>
    <div id="gantt" class="gantt-container"></div>
</div>

<!-- TESTERS TAB -->
<div id="testers" class="tab">
    <div class="section">
        <h3>Add Tester</h3>
        <input id="testerName" placeholder="Tester Name">
        <button onclick="addTester()">Add</button>
    </div>
    <div class="section">
        <h3>Tester List</h3>
        <table id="testerTable"></table>
    </div>
</div>

<!-- PROJECTS TAB -->
<div id="projects" class="tab">
    <div class="section">
        <h3>Add Project</h3>
        <input id="projectName" placeholder="Project Name">
        <select id="priority">
            <option>P1</option><option>P2</option><option>P3</option>
        </select>
        <input type="color" id="projectColor" value="#0984e3">
        <button onclick="addProject()">Add</button>
    </div>
    <div class="section">
        <h3>Project List</h3>
        <table id="projectTable"></table>
    </div>
</div>

<!-- ALLOCATIONS TAB -->
<div id="allocations" class="tab">
    <div class="section">
        <h3>Add Allocation</h3>
        <select id="allocTester"></select>
        <select id="allocProject"></select>
        <input type="date" id="allocStart">
        <input type="date" id="allocEnd">
        <input type="number" id="allocPercent" placeholder="%">
        <button onclick="addAllocation()">Add</button>
    </div>
    <div class="section">
        <h3>Allocation List</h3>
        <table id="allocationTable"></table>
    </div>
</div>

<!-- LEAVE TAB -->
<div id="leave" class="tab">
    <div class="section">
        <h3>Add Leave</h3>
        <select id="leaveTester"></select>
        <input type="date" id="leaveStart">
        <input type="date" id="leaveEnd">
        <button onclick="addLeave()">Add Leave</button>
    </div>
    <div class="section">
        <h3>Leave List</h3>
        <table id="leaveTable"></table>
    </div>
</div>
<!-- Generic Edit Modal -->
<div id="editOverlay" class="modal-overlay">
    <div class="modal">
        <h3 id="editTitle"></h3>
        <div id="editBody"></div>
        <div class="modal-footer">
            <button onclick="closeEditModal()">Cancel</button>
            <button onclick="saveEdit()">Save</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const DATA_VERSION = 1;
let db;
let currentEdit = null; // { type, id }

function normalizeState(input){
    const s = (input && typeof input === "object") ? input : {};
    const testers = Array.isArray(s.testers) ? s.testers : [];
    const projects = Array.isArray(s.projects) ? s.projects : [];
    const allocations = Array.isArray(s.allocations) ? s.allocations : [];
    const leaves = Array.isArray(s.leaves) ? s.leaves : [];

    const maxId = (arr)=>arr.reduce((m, x)=>Math.max(m, Number(x && x.id) || 0), 0);

    return {
        version: Number(s.version) || DATA_VERSION,
        importedAt: new Date().toISOString(),
        nextIds: {
            testers: maxId(testers) + 1,
            projects: maxId(projects) + 1,
            allocations: maxId(allocations) + 1,
            leaves: maxId(leaves) + 1
        },
        testers,
        projects,
        allocations,
        leaves
    };
}

const request = indexedDB.open("EnterprisePlannerTabsDB",1);

request.onupgradeneeded = e=>{
    db=e.target.result;
    if(!db.objectStoreNames.contains("testers"))
        db.createObjectStore("testers",{keyPath:"id",autoIncrement:true});
    if(!db.objectStoreNames.contains("projects"))
        db.createObjectStore("projects",{keyPath:"id",autoIncrement:true});
    if(!db.objectStoreNames.contains("allocations"))
        db.createObjectStore("allocations",{keyPath:"id",autoIncrement:true});
    if(!db.objectStoreNames.contains("leaves"))
        db.createObjectStore("leaves",{keyPath:"id",autoIncrement:true});
};

request.onsuccess = e=>{
    db=e.target.result;
    refreshAll();
};

function getAll(store){
    return new Promise(resolve=>{
        db.transaction(store)
          .objectStore(store)
          .getAll()
          .onsuccess=e=>{
              resolve(e.target.result);
          };
    });
}

function downloadTextFile(filename, text, mime="application/json"){
    const blob = new Blob([text], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

function exportToJson(){
    Promise.all([
        getAll("testers"),
        getAll("projects"),
        getAll("allocations"),
        getAll("leaves")
    ]).then(([testers, projects, allocations, leaves])=>{
        const normalized = normalizeState({ testers, projects, allocations, leaves });
        const payload = JSON.stringify(normalized, null, 2);
        downloadTextFile("EnterpriseResourcePlannerData.json", payload);
    });
}

function importFromJson(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json,.json";
    input.onchange = async ()=>{
        const file = input.files && input.files[0];
        if(!file) return;
        try{
            const text = await file.text();
            const obj = JSON.parse(text);
            const normalized = normalizeState(obj);

            const tx = db.transaction(["testers","projects","allocations","leaves"],"readwrite");

            const testersStore = tx.objectStore("testers");
            const projectsStore = tx.objectStore("projects");
            const allocationsStore = tx.objectStore("allocations");
            const leavesStore = tx.objectStore("leaves");

            testersStore.clear();
            projectsStore.clear();
            allocationsStore.clear();
            leavesStore.clear();

            normalized.testers.forEach(t=>testersStore.add(t));
            normalized.projects.forEach(p=>projectsStore.add(p));
            normalized.allocations.forEach(a=>allocationsStore.add(a));
            normalized.leaves.forEach(l=>leavesStore.add(l));

            tx.oncomplete = ()=>{
                refreshAll();
            };
            tx.onerror = e=>{
                console.error("Import transaction failed", e);
                alert("Failed to import JSON into database.");
            };
        }catch(err){
            console.error(err);
            alert("Invalid JSON file.");
        }
    };
    input.click();
}

async function exportToExcel(){

    const testers=await getAll("testers");
    const projects=await getAll("projects");
    const allocations=await getAll("allocations");
    const leaves=await getAll("leaves");

    const startOfYear=new Date(YEAR,0,1);
    const endOfYear = new Date(YEAR,11,31);

    // Same day-level date parsing as renderGantt (local date, not UTC)
    function toDayTime(dateStrOrDate) {
        const d = typeof dateStrOrDate === "string"
            ? (() => { const [y, m, day] = dateStrOrDate.split("-").map(Number); return new Date(y, m - 1, day); })()
            : new Date(dateStrOrDate);
        d.setHours(0, 0, 0, 0);
        return d.getTime();
    }

    // Build one column per day (each date in its own cell)
    const dayColumns = [];
    const cursor = new Date(startOfYear);
    while (cursor <= endOfYear) {
        const dayTime = toDayTime(cursor);
        const monthLabel = cursor.toLocaleString(undefined, { month: "short" });
        const dayNum = String(cursor.getDate()).padStart(2, "0");
        dayColumns.push({ date: new Date(cursor), dayTime, monthLabel, dayNum });
        cursor.setDate(cursor.getDate() + 1);
    }

    let data = [];

    // Header row 1: Month (one cell per day; we'll merge same months)
    const header1 = ["Tester"];
    dayColumns.forEach((d) => { header1.push(d.monthLabel); });
    data.push(header1);

    // Build month merge ranges for row 0 (so Jan spans all Jan days, etc.)
    const monthMerges = [];
    let runStart = 0;
    for (let i = 1; i <= dayColumns.length; i++) {
        const newMonth = i === dayColumns.length || dayColumns[i].monthLabel !== dayColumns[runStart].monthLabel;
        if (newMonth) {
            if (runStart < i) {
                monthMerges.push({ s: { r: 0, c: 1 + runStart }, e: { r: 0, c: 0 + i } });
            }
            runStart = i;
        }
    }

    // Header row 2: Date (one cell per day: 01, 02, 03...)
    const header2 = ["Date"];
    dayColumns.forEach((d) => { header2.push(d.dayNum); });
    data.push(header2);

    // Data rows: one cell per day per tester
    testers.forEach(tester => {
        const row = [tester.name];

        dayColumns.forEach((dayCol) => {
            const dayTime = dayCol.dayTime;
            let cellText = "";
            let total = 0;

            leaves.filter(l => l.testerId === tester.id).forEach(l => {
                const lStart = toDayTime(l.start);
                const lEnd = toDayTime(l.end);
                if (lStart <= dayTime && dayTime <= lEnd) cellText += "LEAVE ";
            });

            allocations.filter(a => a.testerId === tester.id).forEach(a => {
                const aStart = toDayTime(a.start);
                const aEnd = toDayTime(a.end);
                if (aStart <= dayTime && dayTime <= aEnd) {
                    total += a.percent;
                    const proj = projects.find(p => p.id === a.projectId);
                    if (proj) cellText += `${proj.name} (${a.percent}%) `;
                }
            });

            if (total > 100) cellText += "[OVER]";
            row.push(cellText.trim());
        });

        data.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    if (monthMerges.length) ws["!merges"] = monthMerges;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Yearly Capacity");

    XLSX.writeFile(wb, `Capacity_${YEAR}.xlsx`);
}

const YEAR = new Date().getFullYear();

function showTab(id, btn){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".navbar button").forEach(b=>b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
}

function openEditModal(title, bodyHtml){
    currentEdit = currentEdit || {};
    document.getElementById("editTitle").innerText = title;
    document.getElementById("editBody").innerHTML = bodyHtml;
    document.getElementById("editOverlay").style.display = "flex";
}

function closeEditModal(){
    document.getElementById("editOverlay").style.display = "none";
    currentEdit = null;
}

async function refreshAll(){
    await refreshDropdowns();
    await renderGantt();
}

async function refreshDropdowns(){
    const [testers, projects, allocations, leaves] = await Promise.all([
        getAll("testers"),
        getAll("projects"),
        getAll("allocations"),
        getAll("leaves")
    ]);

    // Dropdowns
    const allocTester=document.getElementById("allocTester");
    const leaveTester=document.getElementById("leaveTester");
    const allocProject=document.getElementById("allocProject");

    allocTester.innerHTML="";
    leaveTester.innerHTML="";
    testers.forEach(t=>{
        allocTester.innerHTML+=`<option value="${t.id}">${t.name}</option>`;
        leaveTester.innerHTML+=`<option value="${t.id}">${t.name}</option>`;
    });

    allocProject.innerHTML="";
    projects.forEach(p=>{
        allocProject.innerHTML+=`<option value="${p.id}">${p.name} (${p.priority})</option>`;
    });

    // Tester table
    const testerTable=document.getElementById("testerTable");
    testerTable.innerHTML="<tr><th>Name</th><th>Actions</th></tr>";
    testers.forEach(t=>{
        testerTable.innerHTML+=`<tr>
            <td>${t.name}</td>
            <td>
                <button onclick="editTester(${t.id})">Edit</button>
                <button onclick="deleteTester(${t.id})">Delete</button>
            </td>
        </tr>`;
    });

    // Project table
    const projectTable=document.getElementById("projectTable");
    projectTable.innerHTML="<tr><th>Name</th><th>Priority</th><th>Actions</th></tr>";
    projects.forEach(p=>{
        projectTable.innerHTML+=`<tr>
            <td>${p.name}</td>
            <td>${p.priority}</td>
            <td>
                <button onclick="editProject(${p.id})">Edit</button>
                <button onclick="deleteProject(${p.id})">Delete</button>
            </td>
        </tr>`;
    });

    // Allocation table
    const allocationTable = document.getElementById("allocationTable");
    allocationTable.innerHTML = "<tr><th>Tester</th><th>Project</th><th>Start</th><th>End</th><th>%</th><th>Actions</th></tr>";
    allocations.forEach(a => {
        const tester = testers.find(t => t.id === a.testerId);
        const project = projects.find(p => p.id === a.projectId);
        const testerName = tester ? tester.name : "";
        const projectName = project ? project.name : "";
        allocationTable.innerHTML += `<tr>
            <td>${testerName}</td>
            <td>${projectName}</td>
            <td>${a.start}</td>
            <td>${a.end}</td>
            <td>${a.percent}</td>
            <td>
                <button onclick="editAllocation(${a.id})">Edit</button>
                <button onclick="deleteAllocation(${a.id})">Delete</button>
            </td>
        </tr>`;
    });

    // Leave table
    const leaveTable = document.getElementById("leaveTable");
    leaveTable.innerHTML = "<tr><th>Tester</th><th>Start</th><th>End</th><th>Actions</th></tr>";
    leaves.forEach(l => {
        const tester = testers.find(t => t.id === l.testerId);
        const testerName = tester ? tester.name : "";
        leaveTable.innerHTML += `<tr>
            <td>${testerName}</td>
            <td>${l.start}</td>
            <td>${l.end}</td>
            <td>
                <button onclick="editLeave(${l.id})">Edit</button>
                <button onclick="deleteLeave(${l.id})">Delete</button>
            </td>
        </tr>`;
    });
}

async function deleteTester(id){
    if(!confirm("Delete this tester and all related allocations/leaves?")) return;
    const [allocations, leaves] = await Promise.all([
        getAll("allocations"),
        getAll("leaves")
    ]);
    const tx = db.transaction(["testers","allocations","leaves"],"readwrite");
    tx.objectStore("testers").delete(id);
    const allocStore = tx.objectStore("allocations");
    allocations.filter(a=>a.testerId===id).forEach(a=>allocStore.delete(a.id));
    const leaveStore = tx.objectStore("leaves");
    leaves.filter(l=>l.testerId===id).forEach(l=>leaveStore.delete(l.id));
    tx.oncomplete = ()=>{ refreshAll(); };
}

async function deleteProject(id){
    if(!confirm("Delete this project and all related allocations?")) return;
    const allocations = await getAll("allocations");
    const tx = db.transaction(["projects","allocations"],"readwrite");
    tx.objectStore("projects").delete(id);
    const allocStore = tx.objectStore("allocations");
    allocations.filter(a=>a.projectId===id).forEach(a=>allocStore.delete(a.id));
    tx.oncomplete = ()=>{ refreshAll(); };
}

function deleteAllocation(id){
    if(!confirm("Delete this allocation?")) return;
    const tx = db.transaction("allocations","readwrite");
    tx.objectStore("allocations").delete(id);
    tx.oncomplete = ()=>{ refreshAll(); };
}

function deleteLeave(id){
    if(!confirm("Delete this leave entry?")) return;
    const tx = db.transaction("leaves","readwrite");
    tx.objectStore("leaves").delete(id);
    tx.oncomplete = ()=>{ refreshAll(); };
}

async function editTester(id){
    const testers = await getAll("testers");
    const tester = testers.find(t => t.id === id);
    if(!tester) return;
    const name = prompt("Edit tester name:", tester.name);
    if(name === null) return;
    const trimmed = name.trim();
    if(!trimmed) return alert("Name cannot be empty.");
    const tx = db.transaction("testers","readwrite");
    tx.objectStore("testers").put({ id, name: trimmed });
    tx.oncomplete = ()=>{ refreshAll(); };
}

async function editProject(id){
    const projects = await getAll("projects");
    const project = projects.find(p => p.id === id);
    if(!project) return;
    currentEdit = { type:"project", id };
    const bodyHtml = `
        <label>

            <input id="editProjectName" value="${project.name || ""}">
        </label><br>
        <label>
            Priority<br>
            <select id="editProjectPriority">
                <option value="P1"${project.priority==="P1"?" selected":""}>P1</option>
                <option value="P2"${project.priority==="P2"?" selected":""}>P2</option>

        </label><br>
        <label>
            Color<br>
            <input type="color" id="editProjectColor" value="${project.color || "#0984e3"}">

    `;

}

async function editAllocation(id){
    const [allocations, testers, projects] = await Promise.all([
        getAll("allocations"),
        getAll("testers"),
        getAll("projects")
    ]);
    const allocation = allocations.find(a => a.id === id);
    if(!allocation) return;

    currentEdit = { type:"allocation", id };

    const testerOptions = testers.map(t =>
        `<option value="${t.id}"${t.id===allocation.testerId?" selected":""}>${t.name}</option>`
    ).join("");
    const projectOptions = projects.map(p =>
        `<option value="${p.id}"${p.id===allocation.projectId?" selected":""}>${p.name} (${p.priority})</option>`
    ).join("");

    const bodyHtml = `
        <label>
            Tester<br>
            <select id="editAllocTester">${testerOptions}</select>
        </label><br>
        <label>
            Project<br>
            <select id="editAllocProject">${projectOptions}</select>
        </label><br>
        <label>
            Start date<br>
            <input type="date" id="editAllocStart" value="${allocation.start}">
        </label><br>
        <label>
            End date<br>
            <input type="date" id="editAllocEnd" value="${allocation.end}">
        </label><br>
        <label>
            Percent<br>
            <input type="number" id="editAllocPercent" value="${allocation.percent}">
        </label>
    `;
    openEditModal("Edit Allocation", bodyHtml);
}

async function editLeave(id){
    const [leaves, testers] = await Promise.all([
        getAll("leaves"),
        getAll("testers")
    ]);
    const leave = leaves.find(l => l.id === id);
    if(!leave) return;

function saveEdit(){
    if(!currentEdit) return;
    if(currentEdit.type === "project"){
        const name = document.getElementById("editProjectName").value.trim();
        const priority = document.getElementById("editProjectPriority").value;
        const color = document.getElementById("editProjectColor").value || "#0984e3";
        if(!name) return alert("Project name cannot be empty.");
        const tx = db.transaction("projects","readwrite");
        tx.objectStore("projects").put({
            id: currentEdit.id,
            name,
            priority,
            color
        });
        tx.oncomplete = ()=>{ closeEditModal(); refreshAll(); };
    } else if(currentEdit.type === "allocation"){
        const testerId = Number(document.getElementById("editAllocTester").value);
        const projectId = Number(document.getElementById("editAllocProject").value);
        const start = document.getElementById("editAllocStart").value;
        const end = document.getElementById("editAllocEnd").value;
        const percent = Number(document.getElementById("editAllocPercent").value);
        if(!testerId || !projectId || !start || !end || !percent || isNaN(percent)){
            return alert("Please fill all allocation fields with valid values.");
        }
        const tx = db.transaction("allocations","readwrite");
        tx.objectStore("allocations").put({
            id: currentEdit.id,
            testerId,
            projectId,
            start,
            end,
            percent
        });
        tx.oncomplete = ()=>{ closeEditModal(); refreshAll(); };
    } else if(currentEdit.type === "leave"){
        const testerId = Number(document.getElementById("editLeaveTester").value);
        const start = document.getElementById("editLeaveStart").value;
        const end = document.getElementById("editLeaveEnd").value;
        if(!testerId || !start || !end){
            return alert("Please fill all leave fields.");
        }
        const tx = db.transaction("leaves","readwrite");
        tx.objectStore("leaves").put({
            id: currentEdit.id,
            testerId,
            start,
            end
        });
        tx.oncomplete = ()=>{ closeEditModal(); refreshAll(); };
    }
}

async function renderGantt(){
    const container=document.getElementById("gantt");
    container.innerHTML="";

    const testers=await getAll("testers");
    const projects=await getAll("projects");
    const allocations=await getAll("allocations");
    const leaves=await getAll("leaves");

    const startOfYear=new Date(YEAR,0,1);
    const endOfYear = new Date(YEAR,11,31);

    // Precompute all weeks for consistent use (header + rows)
    const weeks = [];
    let wIndex = 0;
    while (true) {
        const weekStart = new Date(startOfYear);
        weekStart.setDate(startOfYear.getDate() + wIndex*7);
        if (weekStart > endOfYear) break;

        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);
        if (weekEnd > endOfYear) weekEnd.setTime(endOfYear.getTime());

        // Build list of day numbers (dd) for the week
        const days=[];
        const dayCursor = new Date(weekStart);
        while (dayCursor <= weekEnd) {
            const dd = String(dayCursor.getDate()).padStart(2,"0");
            days.push(dd);
            dayCursor.setDate(dayCursor.getDate()+1);
        }

        // Use the mid‑week date to decide which month this week mostly belongs to
        const midDate = new Date(weekStart);
        midDate.setDate(weekStart.getDate()+3);
        if (midDate > endOfYear) midDate.setTime(endOfYear.getTime());
        const monthLabel = midDate.toLocaleString(undefined, { month: "short" });

        weeks.push({ index: wIndex, weekStart, weekEnd, days, monthLabel });
        wIndex++;
    }

    // Build months list for month row (colspans)
    const months = [];
    let current = null;
    weeks.forEach(wk => {
        if(!current || current.label !== wk.monthLabel){
            if(current) months.push(current);
            current = { label: wk.monthLabel, count: 1 };
        } else {
            current.count++;
        }
    });
    if(current) months.push(current);

    const wrapper = document.createElement("div");
    wrapper.className = "gantt-wrapper";

    const fixedCol = document.createElement("div");
    fixedCol.className = "gantt-fixed";
    const namesTable = document.createElement("table");
    namesTable.className = "gantt-names-table";
    const namesThead = document.createElement("thead");
    const namesHeaderRow1 = document.createElement("tr");
    const cornerCell = document.createElement("th");
    cornerCell.className = "tester-corner";
    cornerCell.rowSpan = 2;
    namesHeaderRow1.appendChild(cornerCell);
    namesThead.appendChild(namesHeaderRow1);
    const namesHeaderRow2 = document.createElement("tr");
    namesThead.appendChild(namesHeaderRow2);
    namesTable.appendChild(namesThead);
    const namesTbody = document.createElement("tbody");
    testers.forEach(tester => {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "tester-label";
        td.textContent = tester.name;
        tr.appendChild(td);
        namesTbody.appendChild(tr);
    });
    namesTable.appendChild(namesTbody);
    fixedCol.appendChild(namesTable);
    wrapper.appendChild(fixedCol);

    const scrollCol = document.createElement("div");
    scrollCol.className = "gantt-scroll";
    const table = document.createElement("table");
    table.className = "gantt-table";
    table.style.minWidth = (weeks.length * 100) + "px";

    const colgroup = document.createElement("colgroup");
    weeks.forEach(() => {
        const col = document.createElement("col");
        col.className = "col-week";
        colgroup.appendChild(col);
    });
    table.appendChild(colgroup);

    const thead = document.createElement("thead");
    const monthRow = document.createElement("tr");
    months.forEach(m => {
        const th = document.createElement("th");
        th.className = "month-cell";
        th.colSpan = m.count;
        th.textContent = m.label;
        monthRow.appendChild(th);
    });
    thead.appendChild(monthRow);
    const weekRow = document.createElement("tr");
    weeks.forEach(wk => {
        const th = document.createElement("th");
        th.className = "week-header-cell";
        th.innerHTML = `
            <span class="week-week">W${wk.index + 1}</span>
            <span class="week-days">${wk.days.join(" ")}</span>
        `;
        weekRow.appendChild(th);
    });
    thead.appendChild(weekRow);
    table.appendChild(thead);

    function toDayTime(dateStrOrDate) {
        const d = typeof dateStrOrDate === "string"
            ? (() => { const [y, m, day] = dateStrOrDate.split("-").map(Number); return new Date(y, m - 1, day); })()
            : new Date(dateStrOrDate);
        d.setHours(0, 0, 0, 0);
        return d.getTime();
    }
    const dayMs = 24 * 60 * 60 * 1000;
    function formatDateForTooltip(dateStr) {
        const [y, m, d] = dateStr.split("-").map(Number);
        return new Date(y, m - 1, d).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    // Assign vertical lanes so overlapping allocations and leaves (in time) get different rows and never overlap.
    function assignLanes(testerAllocs, testerLeaves) {
        const intervals = [
            ...testerAllocs.map(a => ({ key: "a-" + a.id, start: toDayTime(a.start), end: toDayTime(a.end) })),
            ...testerLeaves.map(l => ({ key: "l-" + l.id, start: toDayTime(l.start), end: toDayTime(l.end) }))
        ].sort((a, b) => a.start - b.start);
        const laneEnd = [];
        const keyToLane = new Map();
        for (const it of intervals) {
            let lane = 0;
            while (lane < laneEnd.length && laneEnd[lane] > it.start) lane++;
            if (lane === laneEnd.length) laneEnd.push(0);
            laneEnd[lane] = it.end;
            keyToLane.set(it.key, lane);
        }
        return { keyToLane, numLanes: laneEnd.length };
    }

    const ROW_HEIGHT_BASE = 76;
    const LANE_HEIGHT = 20;

    const tbody = document.createElement("tbody");
    testers.forEach(tester => {
        const testerAllocs = allocations.filter(a => a.testerId === tester.id);
        const testerLeaves = leaves.filter(l => l.testerId === tester.id);
        const { keyToLane, numLanes } = assignLanes(testerAllocs, testerLeaves);
        const rowHeight = Math.max(ROW_HEIGHT_BASE, numLanes * LANE_HEIGHT + 12);

        const row = document.createElement("tr");

        weeks.forEach(wk => {
            const cell = document.createElement("td");
            cell.className = "week-cell";
            cell.style.height = rowHeight + "px";
            cell.style.minHeight = rowHeight + "px";
            let total = 0;
            const wkStartTime = toDayTime(wk.weekStart);
            const wkEndTime = toDayTime(wk.weekEnd);
            const weekSpanMs = (wkEndTime - wkStartTime) / dayMs + 1;

            testerLeaves.forEach(l => {
                const lStartTime = toDayTime(l.start);
                const lEndTime = toDayTime(l.end);
                if (lStartTime <= wkEndTime && lEndTime >= wkStartTime) {
                    const lane = keyToLane.get("l-" + l.id) ?? 0;
                    const effStart = Math.max(lStartTime, wkStartTime);
                    const effEnd = Math.min(lEndTime, wkEndTime);
                    const leftPercent = ((effStart - wkStartTime) / dayMs / weekSpanMs) * 100;
                    const numDays = (effEnd - effStart) / dayMs + 1;
                    const widthPercent = (numDays / weekSpanMs) * 100;
                    const title = "Leave: " + formatDateForTooltip(l.start) + " — " + formatDateForTooltip(l.end);
                    const box = document.createElement("div");
                    box.className = "leave-box";
                    box.setAttribute("data-start", l.start);
                    box.setAttribute("data-end", l.end);
                    box.setAttribute("title", title);
                    box.style.left = leftPercent + "%";
                    box.style.width = Math.max(2, widthPercent) + "%";
                    box.style.top = (lane * LANE_HEIGHT) + "px";
                    box.textContent = "LEAVE";
                    cell.appendChild(box);
                }
            });

            allocations.filter(a => a.testerId === tester.id).forEach(a => {
                const aStartTime = toDayTime(a.start);
                const aEndTime = toDayTime(a.end);
                if (aStartTime <= wkEndTime && aEndTime >= wkStartTime) {
                    total += a.percent;
                    const proj = projects.find(p => p.id === a.projectId);
                    if (proj) {
                        const lane = keyToLane.get("a-" + a.id) ?? 0;
                        const effStart = Math.max(aStartTime, wkStartTime);
                        const effEnd = Math.min(aEndTime, wkEndTime);
                        const leftPercent = ((effStart - wkStartTime) / dayMs / weekSpanMs) * 100;
                        const numDays = (effEnd - effStart) / dayMs + 1;
                        const widthPercent = (numDays / weekSpanMs) * 100;
                        const title = proj.name + ": " + formatDateForTooltip(a.start) + " — " + formatDateForTooltip(a.end);
                        const box = document.createElement("div");
                        box.className = "project-box";
                        box.setAttribute("data-start", a.start);
                        box.setAttribute("data-end", a.end);
                        box.setAttribute("title", title);
                        box.style.background = proj.color;
                        box.style.left = leftPercent + "%";
                        box.style.width = Math.max(2, widthPercent) + "%";
                        box.style.top = (lane * LANE_HEIGHT) + "px";
                        box.textContent = proj.name + " (" + a.percent + "%)";
                        cell.appendChild(box);
                    }
                }
            });

            if (total > 100) cell.classList.add("over");
            row.appendChild(cell);
        });

        tbody.appendChild(row);
    });
    table.appendChild(tbody);
    scrollCol.appendChild(table);
    wrapper.appendChild(scrollCol);
    container.appendChild(wrapper);

    function syncRowHeights() {
        const datesThead = table.querySelector("thead");
        const datesBodyRows = table.querySelector("tbody").rows;
        const namesCorner = namesTable.querySelector(".tester-corner");
        const namesBodyCells = namesTable.querySelectorAll(".tester-label");
        if (datesThead && namesCorner) {
            namesCorner.style.height = datesThead.offsetHeight + "px";
        }
        for (let i = 0; i < datesBodyRows.length && i < namesBodyCells.length; i++) {
            namesBodyCells[i].style.height = datesBodyRows[i].offsetHeight + "px";
        }
    }
    requestAnimationFrame(() => {
        requestAnimationFrame(syncRowHeights);
    });
}

// DB open will trigger initial refresh via request.onsuccess
</script>
</body>
</html>
